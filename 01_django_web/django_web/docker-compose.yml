services:
  web:  # 실행할 컨테이너 (web, posgresSQL)
    build: .
    command: gunicorn django_web.wsgi:appliacation --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15          # 컨테이너화 할 이미지 (docker hub에서 가져옴)
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/  # 호스트의 디렉토리를 컨테이너의 디렉토리에 마운트
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      
volumes:
  postgres_data:  # 볼륨 이름 (docker volume ls로 확인 가능)